name: TechNova CI/CD Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  IMAGE_NAME: technova-inventory
  REGISTRY: ghcr.io

jobs:
  # ═══════════════════════════════════════════
  # Stage 1: Lint & Unit Test
  # ═══════════════════════════════════════════
  test:
    name: "🧪 Test & Coverage"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run tests with coverage
        run: |
          pytest tests/ -v --tb=short \
            --cov=app --cov-report=xml --cov-report=term-missing

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage.xml

  # ═══════════════════════════════════════════
  # Stage 2: SonarQube Code Analysis
  # ═══════════════════════════════════════════
  sonarqube:
    name: "🔒 SonarQube Analysis"
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/download-artifact@v4
        with:
          name: coverage-report

      - name: SonarQube Scan
        uses: SonarSource/sonarqube-scan-action@v3
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}

  # ═══════════════════════════════════════════
  # Stage 3: Build Docker Image
  # ═══════════════════════════════════════════
  build:
    name: "🐳 Build & Push Image"
    runs-on: ubuntu-latest
    needs: [test, sonarqube]
    if: github.ref == 'refs/heads/main'
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ env.REGISTRY }}/synthever/${{ env.IMAGE_NAME }}:latest
            ${{ env.REGISTRY }}/synthever/${{ env.IMAGE_NAME }}:${{ github.sha }}

  # ═══════════════════════════════════════════
  # Stage 4: Deploy to Production
  # ═══════════════════════════════════════════
  deploy:
    name: "🚀 Deploy"
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main'
    environment: production
    steps:
      - uses: actions/checkout@v4

      - name: Deploy with rollback support
        run: |
          echo "=== Deploy Simulation Mode (Demo) ==="
          echo "⚠️  Note: Actual deployment requires production server access"
          echo ""
          echo "📦 Image ready: ${{ env.REGISTRY }}/synthever/${{ env.IMAGE_NAME }}:${{ github.sha }}"
          echo ""
          echo "In production environment, this stage would:"
          echo "  1. Pull image from GHCR"
          echo "  2. Tag current running version for rollback"
          echo "  3. Deploy with docker-compose"
          echo "  4. Health check on deployed app"
          echo "  5. Auto-rollback if health check fails"
          echo ""
          echo "✅ Deploy stage validated (simulation mode)"
